<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Portal de Pagamentos icouTv - Acesse sua área de cliente">
        <meta name="theme-color" content="#FD8A24">
        <title>iCouTV - Acesso ao Portal</title>

        <!-- Fonte Inter -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <!-- Estilos -->
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/auth.css">

        <!-- Favicon (placeholder - substituir pela logo real) -->
        <link rel="icon" type="image/svg+xml"
            href="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3e%3ctext y='.9em' font-size='90'%3e📺%3c/text%3e%3c/svg%3e">
    </head>
    <body class="auth-pagina">

        <!-- Container principal de autenticação -->
        <div class="auth-container">

            <!-- Logo / Marca -->
            <div class="auth-marca">
                <div class="logo-texto">iCou<span style="color: var(--cor-texto);">TV</span></div>
                <p class="logo-sub">Portal de Pagamentos</p>
            </div>

            <!-- Card de Login -->
            <div class="auth-card">
                <h2>Bem-vindo de volta!</h2>
                <p class="subtitulo">Faça login para acessar sua área de cliente</p>

                <!-- Mensagem de Erro -->
                <div id="auth-erro" class="auth-erro" role="alert">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="15" y1="9" x2="9" y2="15"></line>
                        <line x1="9" y1="9" x2="15" y2="15"></line>
                    </svg>
                    <span id="auth-erro-msg">Erro ao fazer login</span>
                </div>

                <!-- Formulário de Login -->
                <form id="form-login" novalidate>
                    <!-- Campo E-mail -->
                    <div class="auth-input-grupo">
                        <label for="email">E-mail</label>
                        <div class="auth-input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                            </svg>
                            <input type="email" id="email" class="auth-input" placeholder="seu@email.com"
                                autocomplete="email" required>
                        </div>
                    </div>

                    <!-- Campo Senha -->
                    <div class="auth-input-grupo">
                        <label for="senha">Senha</label>
                        <div class="auth-input-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="senha" class="auth-input" placeholder="Sua senha"
                                autocomplete="current-password" required>
                            <!-- Botão mostrar/ocultar senha -->
                            <button type="button" class="btn-toggle-senha" id="btn-toggle-senha"
                                aria-label="Mostrar senha">
                                <svg id="icone-olho-aberto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg id="icone-olho-fechado" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" style="display:none;">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                                    <path
                                        d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68">
                                    </path>
                                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61">
                                    </path>
                                    <line x1="2" x2="22" y1="2" y2="22"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Botão de Login -->
                    <button type="submit" class="auth-btn" id="btn-login">
                        <span id="btn-login-texto">Entrar</span>
                        <div class="spinner" id="btn-login-spinner" style="display:none;"></div>
                    </button>
                </form>

                <!-- Links de ação -->
                <div class="auth-links">
                    <a href="#" id="link-sem-senha">Acessar sem senha</a>
                    <a href="#" id="link-recuperar-senha">Recuperar senha</a>
                </div>

                <!-- Mensagem de sucesso -->
                <div id="auth-sucesso" class="auth-sucesso" role="status">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <span id="auth-sucesso-msg"></span>
                </div>
            </div>

            <!-- Rodapé -->
            <div class="auth-rodape">
                <p>&copy; 2026 iCouTV. Todos os direitos reservados.</p>
            </div>

        </div>

        <!-- Firebase & Lógica de Autenticação -->
        <script type="module" src="js/auth.js"></script>

    </body>
</html>
